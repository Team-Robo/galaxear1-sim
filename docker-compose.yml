services:
  galaxear1-sim:
    build: .
    container_name: galaxear1-sim
    stdin_open: true
    tty: true
    privileged: true
    network_mode: "host"
    ipc: "host"
    environment:
      - DISPLAY=${DISPLAY}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY}
      - QT_X11_NO_MITSHM=1
      # Uncomment the two lines below + the deploy block if you have an
      # NVIDIA GPU + nvidia-container-toolkit installed. Without an NVIDIA
      # GPU, leave these commented out and Gazebo will fall back to
      # software (llvmpipe) rendering.
      # - NVIDIA_DRIVER_CAPABILITIES=all
      # - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /mnt/wslg:/mnt/wslg:rw
      - ./ros2_ws/src:/ros2_ws/src
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu, utility]